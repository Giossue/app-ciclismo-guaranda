name: android-apk

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android-apk.yml'
      - 'android/**'
      - 'capacitor-www/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'resources/**'
      - 'routes/**'
      - 'vite.config.ts'
      - 'tsconfig.json'

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@07976c6290703d34c16d382cb364cc9eb68fe7a0 # v3.2.2

      - name: Install Node dependencies
        run: npm ci

      - name: Validate mobile server URL
        env:
          GUARANDA_GO_MOBILE_SERVER_URL: ${{ secrets.GUARANDA_GO_MOBILE_SERVER_URL }}
        run: |
          if [ -z "$GUARANDA_GO_MOBILE_SERVER_URL" ]; then
            echo "Missing repository secret: GUARANDA_GO_MOBILE_SERVER_URL" >&2
            exit 1
          fi

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        env:
          GUARANDA_GO_MOBILE_SERVER_URL: ${{ secrets.GUARANDA_GO_MOBILE_SERVER_URL }}
        run: npx cap sync android

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v5.0.0
        with:
          name: guaranda-go-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
